{% extends "base.html" %}
{% block title %}Blog — {{ site.title }}{% endblock %}
{% block main %}
<h1>Blog</h1>

<div class="search-box">
  <label class="sr-only" for="post-search">Search posts</label>
  <input
    type="search"
    id="post-search"
    name="q"
    placeholder="Search posts…"
    value="{{ query }}"
    hx-get="/blog/partials/posts"
    hx-trigger="keyup changed delay:200ms, search"
    hx-target="#post-list"
    hx-include="#post-search"
  />
</div>

<ul id="post-list" class="blog-posts">
  {% include "partials/post_list.html" %}
</ul>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" crossorigin="anonymous"></script>
{% endblock %}
